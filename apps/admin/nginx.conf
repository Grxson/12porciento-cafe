events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver [fd12::10] valid=10s;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            # Railway's internal DNS assigns a new IP to the server on every
            # redeploy. A literal proxy_pass target is resolved once at nginx
            # startup and cached forever, so admin silently hangs against a
            # dead IP after the server redeploys. Routing through a variable
            # forces nginx to re-resolve via `resolver` on each request.
            # A URI after a variable in proxy_pass is not used for
            # location-prefix replacement (unlike a literal target) — nginx
            # forwards the original request URI unchanged, so omit it here.
            set $upstream ${API_URL};
            proxy_pass $upstream;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
        gzip_min_length 1000;
    }
}
