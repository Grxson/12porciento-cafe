services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - '0.0.0.0:3001:3001'
    environment:
      DATABASE_URL: file:/app/data/cafe.db
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    ports:
      - '0.0.0.0:80:80'
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
