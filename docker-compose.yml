services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: file:/app/data/cafe.db
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: http://localhost
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - '80:80'
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
