services:
  - type: web
    name: cafe-server
    runtime: docker
    plan: starter
    dockerfilePath: ./server/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://cafe-client.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: web
    name: cafe-client
    runtime: docker
    plan: starter
    dockerfilePath: ./client/Dockerfile
    envVars: []
    routes:
      - path: /api/*
        destination: https://cafe-server.onrender.com/api/:path

databases:
  - name: cafe-db
    databaseName: cafe_db
    user: cafe_user
    region: ohio
