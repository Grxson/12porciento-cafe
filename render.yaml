services:
  - type: web
    name: cafe-server
    runtime: docker
    dockerfilePath: server/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://cafe-client.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: web
    name: cafe-client
    runtime: docker
    dockerfilePath: client/Dockerfile

databases:
  - name: cafe-db
    databaseName: cafe_db
    user: cafe_user
